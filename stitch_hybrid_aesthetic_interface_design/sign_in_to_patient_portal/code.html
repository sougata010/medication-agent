        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }

<body class="min-h-screen flex items-center justify-center bg-surface">
<div class="w-full max-w-container-max-width mx-auto flex flex-col md:flex-row h-screen md:h-auto md:min-h-[800px] bg-surface-container-lowest md:rounded-xl overflow-hidden shadow-sm md:m-gutter border border-border-muted">
<!-- Trust/Brand Left Side -->
<div class="hidden md:flex flex-col justify-between w-1/2 p-margin-desktop bg-clean-slate border-r border-border-muted relative">
<div class="z-10">
<h1 class="font-display text-display text-primary mb-stack-sm">MedGraph Intelligence</h1>
<p class="font-body-lg text-body-lg text-text-clinical">Vigilant Oversight. Medical Rigor Guaranteed.</p>
</div>
<!-- Abstract Medical Illustration Placeholder -->
<div class="flex-grow flex items-center justify-center my-stack-lg z-10">
<div class="w-full h-full max-h-[400px] rounded-lg bg-surface-variant overflow-hidden" data-alt="A highly detailed, professional, and abstract digital illustration representing medical data intelligence. The image features glowing, interconnected nodes and subtle geometric grids over a clean, very light gray background, evoking a sense of clinical precision, security, and advanced technology. The lighting is soft and high-key, using a palette of crisp whites, deep navy blues, and subtle health teal accents to match a modern medical dashboard aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAlp5m3UqFK4_S7cGlgDblH0uUBAf6c9GiiQlxmBujlIsAQdMVJMC_P49sZLALVqXAvYkyKLf0tBitff1WJ6-V4W9sjD-xgFcDEeTnN9CW3xBAMTk5_2EWw_dYcTxMBnBxWrtRio_4bxnYZJv3IKM64dNHQIMMh2rAgRMvLXelREEUr0Ajhyzvt3BKJghAs8qnBjQ7vAxP-foOA5I9FaoFrW6uleFoOrRFZMG8_srV34QANHbd9Z2jaNvzw6PLxLGdS5dQ11cNrMrM')">
</div>
</div>
<div class="z-10 mt-auto">
<div class="flex items-center space-x-unit text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="shield" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-body-sm text-body-sm">Enterprise-grade security &amp; HIPAA compliance.</span>
</div>
</div>
<!-- Subtle ambient background element -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-fixed/20 to-transparent pointer-events-none"></div>
</div>
<!-- Login Form Right Side -->
<div class="w-full md:w-1/2 flex flex-col justify-center p-margin-mobile md:p-margin-desktop bg-surface-container-lowest">
<div class="max-w-md w-full mx-auto">
<div class="mb-stack-lg text-center md:text-left">
<h2 class="font-headline-lg text-headline-lg text-primary mb-unit">Secure Access</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Authenticate to access clinical data.</p>
</div>
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div>
<label class="block font-label-caps text-label-caps text-text-clinical mb-unit uppercase tracking-widest" for="email">Clinical Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-border-muted rounded-lg bg-surface focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface transition-colors" id="email" name="email" placeholder="dr.smith@hospital.org" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-unit">
<label class="block font-label-caps text-label-caps text-text-clinical uppercase tracking-widest" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors" href="#">Reset?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-border-muted rounded-lg bg-surface focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-stack-sm">
<button class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-lg shadow-sm font-clinical-data text-clinical-data text-on-secondary bg-secondary hover:bg-on-secondary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-colors h-12" type="submit">
                            Authenticate
                            <span class="material-symbols-outlined ml-2 text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="mt-stack-lg mb-stack-md relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-muted"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest font-citation text-citation text-outline uppercase tracking-wider">Secure Alternate Auth</span>
</div>
</div>
<!-- Social/SSO (Clinical Context) -->
<div class="space-y-stack-sm">
<button class="w-full flex items-center justify-center py-2 px-4 border border-border-muted rounded-lg bg-surface hover:bg-surface-container-low font-body-sm text-body-sm text-primary transition-colors h-11" type="button">
<span class="material-symbols-outlined mr-2 text-[20px] text-outline" data-icon="badge">badge</span>
                        Continue with Institutional SSO
                    </button>
</div>
<!-- Registration Link -->
<div class="mt-stack-lg text-center font-body-sm text-body-sm text-on-surface-variant">
                    Require access? <a class="font-clinical-data text-clinical-data text-primary hover:underline" href="#">Request Credentials</a>
</div>
</div>
</div>
</div>
